name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest
        run: |
          tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: version
        run: |
          current="${{ steps.latest.outputs.tag }}"
          current="${current#v}"

          IFS='.' read -r major minor patch <<< "$current"

          # Check commit message for version bump instructions
          commit_msg=$(git log -1 --pretty=%B)

          if echo "$commit_msg" | grep -qi '\[major\]'; then
            major=$((major + 1))
            minor=0
            patch=0
          elif echo "$commit_msg" | grep -qi '\[minor\]'; then
            minor=$((minor + 1))
            patch=0
          else
            patch=$((patch + 1))
          fi

          version="${major}.${minor}.${patch}"
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag=v$version" >> $GITHUB_OUTPUT
          echo "Next version: v$version"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  build:
    name: Build Binaries
    needs: release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          output="bak-${{ needs.release.outputs.tag }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags "-X main.version=${{ needs.release.outputs.version }}" -o "$output" ./cmd/bak
          chmod +x "$output"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bak-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bak-*

  publish:
    name: Publish Release
    needs: [release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Create checksums
        run: |
          cd binaries
          sha256sum bak-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          name: Release ${{ needs.release.outputs.tag }}
          generate_release_notes: true
          files: |
            binaries/bak-*
            binaries/checksums.txt
