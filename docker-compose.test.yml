# Docker Compose file for integration tests
#
# Manual testing:
#   make test-integration-up      # Start container (no auto-run tests)
#   make test-integration-shell   # Shell into container
#   # Inside container: bak setup --tag test --paths /tmp/backup-source
#   make test-integration-down    # Cleanup
#
# Run specific test manually inside container:
#   go test -v -tags=integration ./test/integration/... -run TestSetup_BasicConfiguration

services:
  integration-tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    privileged: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock
    environment:
      - RESTIC_REPOSITORY=/tmp/restic-repo
      - RESTIC_PASSWORD=test-password
      # Set AUTO_RUN_TESTS=1 to run tests automatically (used by CI)
      # Omit or set to 0 for manual testing
    tty: true
    stdin_open: true
